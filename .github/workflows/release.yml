# Build the distro packages (deb/rpm/apk) + source tarball with nfpm and
# publish them to a GitHub Release on every vX.Y.Z tag.
#
# The payload is interpreted (pure Python + shell), so there is NOTHING to
# cross-compile: one ubuntu-latest (amd64) runner builds every arch by just
# telling nfpm which arch label to stamp into the package metadata. The OS
# packages the kiosk needs at runtime come from each package's declared
# Depends (see nfpm.yaml), not from this CI.
name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (with or without leading v), e.g. v1.2.3'
        required: true
        type: string

# One release run per ref; a newer push for the same tag wins.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: we only need to create/update a Release and upload assets.
permissions:
  contents: write

env:
  NFPM_VERSION: '2.41.3'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install nfpm
        run: |
          set -euo pipefail
          url="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          echo "Fetching $url"
          curl -fsSL -o /tmp/nfpm.deb "$url"
          sudo dpkg -i /tmp/nfpm.deb
          nfpm --version

      - name: Derive package version
        id: ver
        # Untrusted inputs (the dispatch version, the ref name) are passed via
        # env and never interpolated into the script body, to avoid shell
        # injection. Both are then strictly validated as semver.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            raw="$INPUT_VERSION"
          else
            raw="$REF_NAME"
          fi
          # strip a single leading 'v' (v1.2.3 -> 1.2.3)
          pkg_version="${raw#v}"
          # Validate hard: only X.Y.Z(-prerelease)(+build) is allowed. This both
          # rejects garbage and neutralizes any injection in the value.
          if ! printf '%s' "$pkg_version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)*$'; then
            echo "::error::invalid version '$raw' (expected vX.Y.Z)"
            exit 1
          fi
          # tag we attach the release to (always v-prefixed)
          tag="v$pkg_version"
          echo "pkg_version=$pkg_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Building PKG_VERSION=$pkg_version for tag=$tag"

      - name: Build packages (deb/rpm/apk, all arches)
        env:
          PKG_VERSION: ${{ steps.ver.outputs.pkg_version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          # packager:arch pairs, using nfpm's own arch naming per packager.
          #   deb : arm64, armhf, amd64
          #   rpm : aarch64, x86_64
          #   apk : aarch64, x86_64
          builds=(
            "deb:arm64"
            "deb:armhf"
            "deb:amd64"
            "rpm:aarch64"
            "rpm:x86_64"
            "apk:aarch64"
            "apk:x86_64"
          )

          for entry in "${builds[@]}"; do
            packager="${entry%%:*}"
            arch="${entry##*:}"
            echo "==> nfpm $packager / $arch"
            PKG_ARCH="$arch" \
              nfpm package -f nfpm.yaml -p "$packager" -t dist/
          done

          echo "Built artifacts:"
          ls -l dist/

      - name: Build source tarball (prod files only)
        env:
          PKG_VERSION: ${{ steps.ver.outputs.pkg_version }}
        run: |
          set -euo pipefail
          tarball="p2soc-${PKG_VERSION}.tar.gz"
          # Excludes mirror manifest.package_excludes — packages and the source
          # tarball ship PROD files only (no dev/, tests, CI, secrets, caches).
          tar \
            --exclude-vcs \
            --exclude='./dist' \
            --exclude='./dev' \
            --exclude='./kiosk-host/tests' \
            --exclude='./kiosk-host/.pytest_cache' \
            --exclude='./.github' \
            --exclude='./.claude' \
            --exclude='./.git' \
            --exclude='./.venv' \
            --exclude='./venv' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='*.pyo' \
            --exclude='*.pyd' \
            --exclude='*.egg-info' \
            --exclude='./.env' \
            --exclude='*.env' \
            --exclude='./config/panels.local.yaml' \
            --exclude='./.gitignore' \
            --exclude='./.env.example' \
            --exclude='./secrets' \
            --exclude='./keys' \
            --exclude='*.key' \
            --exclude='*_ed25519' \
            --exclude='*_ed25519.pub' \
            --exclude='./.rbw' \
            --transform "s,^\.,p2soc-${PKG_VERSION}," \
            -czf "dist/${tarball}" .
          echo "Wrote dist/${tarball}"
          # Sanity guard: fail loudly if any excluded path leaked in.
          if tar -tzf "dist/${tarball}" | grep -E "/(dev|tests|\.github|\.git|\.venv|__pycache__)/|\.pyc$|(^|/)\.env$|\.key$" ; then
            echo "::error::source tarball contains excluded (dev/secret) paths"
            exit 1
          fi

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          # checksum every artifact (packages + tarball), filenames only.
          sha256sum -- * > SHA256SUMS
          echo "---- SHA256SUMS ----"
          cat SHA256SUMS

      - name: List release assets
        run: ls -l dist/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: p2soc ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.apk
            dist/p2soc-*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
