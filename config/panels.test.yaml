# Focused test config: 4 WebKit direct panels (no tunnel, no chromium) for
# verifying rendering + native auto-login + 2x2 placement under Xephyr.
display:
  auto: false
  width: 1280
  height: 800
  cols: 2
  rows: 2
  gap: 0

panels:
  - id: p1
    engine: webkit
    grid: [0, 0]
    mode: direct
    url: "http://127.0.0.1:9001/login"
    vault_item: "SOC Dev Panel 1"
    selectors: { user: "#username", pass: "#password", submit: "button[type=submit]" }
    login_marker: "#password"
    keepalive: { strategy: none }
  - id: p2
    engine: webkit
    grid: [1, 0]
    mode: direct
    url: "http://127.0.0.1:9002/login"
    vault_item: "SOC Dev Panel 2"
    selectors: { user: "#username", pass: "#password", submit: "button[type=submit]" }
    login_marker: "#password"
    keepalive: { strategy: none }
  - id: p3
    engine: webkit
    grid: [0, 1]
    mode: direct
    url: "http://127.0.0.1:9003/login"
    vault_item: "SOC Dev Panel 3"
    selectors: { user: "#username", pass: "#password", submit: "button[type=submit]" }
    login_marker: "#password"
    keepalive: { strategy: none }
  - id: p4
    engine: webkit
    grid: [1, 1]
    mode: direct
    url: "http://127.0.0.1:9004/login"
    vault_item: "SOC Dev Panel 4"
    selectors: { user: "#username", pass: "#password", submit: "button[type=submit]" }
    login_marker: "#password"
    keepalive: { strategy: none }

tunnel: { enabled: false }
