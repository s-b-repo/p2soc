# =============================================================================
# SOC video-wall panel configuration  (TEMPLATE — edit for your environment)
# =============================================================================
# This is the single source of truth for the wall. The kiosk host reads it to
# decide what to render, where to place each window, how to log in, and how to
# keep the session alive.
#
# Copy this to /etc/soc-display/panels.yaml on the Pi (install.sh does it) and
# replace the placeholder IPs / vault items / selectors with your real ones.
#
# For local development against the dummy panels, use config/panels.dev.yaml
# (the Makefile `dev`/`verify` targets point there).
# -----------------------------------------------------------------------------

display:
  # Total screen geometry. Leave `auto: true` to detect from xrandr at launch;
  # the host divides it into a `cols` x `rows` grid. Override width/height only
  # if auto-detection picks the wrong mode.
  auto: true
  width: 1920
  height: 1080
  cols: 2
  rows: 2
  gap: 0            # pixels of gap between cells (0 = seamless 2x2)
  # How the grid is realised on screen:
  #   auto    -> one window per panel on X11 (Openbox places them); on Wayland,
  #              a single fullscreen grid window when every panel is webkit
  #   windows -> always one OS window per panel (placed by Openbox/labwc rules)
  #   single  -> always one fullscreen window holding the whole grid (webkit
  #              panels only — the most robust choice, works on any compositor)
  layout: auto

panels:
  # --- Panel 1 -------------------------------------------------------------
  - id: p1
    engine: webkit              # webkit (default, light) | chromium (fallback)
    grid: [0, 0]                # [col, row]  -> top-left
    mode: direct                # direct | tunnel
    url: "http://192.168.1.50:3000/login"
    vault_item: "SOC Panel 1"   # name of the Bitwarden/Vaultwarden login item
    selectors:
      user: "#username"
      pass: "#password"
      submit: "button[type=submit]"
    # Detect "we got logged out" by the login form reappearing. If the app's
    # login URL differs from its dashboard, you can also match on URL.
    login_marker: "#password"   # CSS selector that only exists on the login page
    keepalive:
      strategy: reload          # reload | click | xhr | none
      intervalSec: 600
    # --- Optional renderer security / compat knobs (all default to the SAFE value;
    #     omit them for the default behaviour). See docs/CONFIGURATION.md. ---
    # persist: true             # keep cookies + web storage on disk so a session
    #                           # survives a reload AND a wall restart (false = ephemeral)
    # user_agent: "Mozilla/5.0 (X11)"   # override the browser User-Agent
    # allow: ["*.cdn.example.net"]      # extra ALLOWED top-level-nav domains
    #                                   # (own origin + bundled SSO are allowed already)
    # block_trackers: true      # apply the analytics/tracker blocklist (false = don't)
    # unblock: ["segment.io"]   # tracker hosts THIS panel may load anyway
    # allow_insecure: false     # accept a self-signed cert (alias: insecure_tls)

  # --- Panel 2 -------------------------------------------------------------
  - id: p2
    engine: webkit
    grid: [1, 0]                # top-right
    mode: direct
    url: "http://192.168.1.60:8080/login"
    vault_item: "SOC Panel 2"
    selectors:
      user: "input[name=user]"
      pass: "input[name=pass]"
      submit: ".login-btn"
    login_marker: "input[name=pass]"
    keepalive:
      strategy: xhr
      url: "http://192.168.1.60:8080/api/ping"
      intervalSec: 300

  # --- Panel 3 (behind the SSH jump host, reached via the autossh tunnel) ---
  - id: p3
    engine: chromium            # example: a Chrome-only app
    grid: [0, 1]                # bottom-left
    mode: tunnel
    tunnel:
      local_port: 19103         # autossh -L 127.0.0.1:19103:10.20.0.7:8443
      remote_host: 10.20.0.7
      remote_port: 8443
    # effective_url is derived as http://127.0.0.1:19103/<path>; set the path here:
    path: "/login"
    scheme: "http"              # http | https (the *local* side of the tunnel)
    vault_item: "SOC Panel 3"
    selectors:
      user: "#user"
      pass: "#pw"
      submit: "#submit"
    login_marker: "#pw"
    keepalive:
      strategy: reload
      intervalSec: 900

  # --- Panel 4 -------------------------------------------------------------
  - id: p4
    engine: webkit
    grid: [1, 1]                # bottom-right
    mode: direct
    url: "http://192.168.1.70:9000/login"
    vault_item: "SOC Panel 4"
    selectors:
      user: "#email"
      pass: "#password"
      submit: "button.submit"
    login_marker: "#password"
    keepalive:
      strategy: reload
      intervalSec: 600

# Tunnel targets (consumed by scripts/gen-autossh-args.sh to build the autossh
# -L forwards). Keep in sync with any panel that has mode: tunnel.
tunnel:
  enabled: true
  jump_host: "tunneluser@jump.example.net"
  identity: "/etc/soc-display/keys/tunnel_ed25519"
  # forwards are auto-derived from panels[].tunnel, but you can add extras here:
  extra_forwards: []

# VPN — one supervised tunnel, run by forti-vpn.service as root, so panels on a
# VPN-side network can use mode: direct with their real IPs. Pick the backend
# with `type` (default fortinet). Leave enabled: false to skip the VPN.
#
#   type: fortinet   (default) openfortivpn — gateway + vault_item below
#   type: openvpn    config: /path/to/profile.ovpn  (+ vault_item for user/pass
#                    auth, injected over OpenVPN's management socket; omit for a
#                    certificate-only .ovpn)
#   type: wireguard  config: /etc/wireguard/wg0.conf  (or a bare interface name;
#                    keys live in the .conf — protect it 0600; no vault login)
#
# Examples for the other two backends:
#   vpn: { enabled: true, type: openvpn,   config: "/etc/openvpn/soc.ovpn",
#          vault_item: "SOC OpenVPN", ready_probe: "10.50.0.5:443" }
#   vpn: { enabled: true, type: wireguard, config: "/etc/wireguard/wg0.conf",
#          ready_probe: "10.50.0.5:443", health_check_interval: 30 }
#
# Fortinet (the default) logs in with the FortiGate username + password stored in
# the vault under `vault_item`; the password is fed to openfortivpn via a pinentry
# helper, never on the command line or disk.
vpn:
  enabled: false
  type: fortinet                 # fortinet | openvpn | wireguard
  gateway: "vpn.example.com"     # FortiGate SSL-VPN host
  port: 443
  vault_item: "SOC FortiGate VPN"  # Vaultwarden login (FortiGate user + password)
  # Pin the gateway cert (recommended). Get the digest from the first connect
  # attempt's error, or: openssl s_client -connect host:443 </dev/null \
  #   | openssl x509 -noout -fingerprint -sha256 | sed 's/.*=//;s/://g' | tr A-Z a-z
  trusted_cert: ""
  realm: ""                       # FortiGate realm, if your gateway uses one
  set_routes: true                # accept routes pushed by the gateway
  set_dns: false                  # usually keep the local resolver
  half_internet_routes: false     # true to avoid replacing the default route
  # Reconnection: keep persistent at 0 (recommended). The supervisor in
  # forti-vpn.service then owns reconnects with exponential backoff and backs
  # off MUCH longer on auth/cert failures (rapid retries with a bad password
  # can lock the FortiGate account). persistent > 0 instead lets openfortivpn
  # itself reconnect blindly every N seconds.
  persistent: 0
  otp_from_vault: false           # true: pull a TOTP from the vault item (rbw code)
  # Readiness probe: host:port that is reachable only once the VPN is up.
  # The kiosk host waits on it before opening VPN-side panels (best-effort),
  # and the VPN supervisor uses it for the liveness check below.
  ready_probe: ""                 # e.g. "10.50.0.5:443"
  # Liveness: every N seconds (0 = off) probe ready_probe; after
  # health_check_failures consecutive misses, restart the VPN connection.
  # Catches the "connected but dead tunnel" failure mode.
  health_check_interval: 0        # e.g. 60
  health_check_failures: 3
  extra_args: []                  # any additional openfortivpn flags, e.g. ["-v"]

# Outbound proxy for the panel browsers (corporate HTTP(S)/SOCKS proxy).
# If the proxy requires authentication, put the username/password in a vault
# login and name it in vault_item — the host answers the proxy's challenge in
# memory (WebKit auth signal / Chromium DevTools), so the credentials never
# appear in this file, on a command line, or on disk.
# Loopback (localhost/127.0.0.1) always bypasses the proxy, so tunnels and the
# local Vaultwarden keep working; add internal hosts to ignore_hosts.
proxy:
  enabled: false
  url: "http://proxy.example.com:3128"   # http | https | socks5 ://host:port
  vault_item: ""                         # e.g. "SOC Proxy" (blank = no auth)
  ignore_hosts: []                       # e.g. ["*.corp.lan", "10.0.0.0/8"]

# Renderer security defaults (OPTIONAL — omit this whole block for the default
# behaviour; every key defaults to the safe/on value). These harden every panel:
# top-level navigation is restricted to an allowlist (own origin + bundled cloud
# SSO + the domains below) and the top-20 analytics/trackers are blocked. None of
# this breaks a normal dashboard — only OFF-allowlist top-level nav and
# third-party trackers are refused. See docs/CONFIGURATION.md + docs/SECURITY.md.
# Override at boot with SOC_NAV_ALLOWLIST / SOC_BLOCK_TRACKERS (0/1) in soc.env.
# security:
#   nav_allowlist: true        # gate top-level navigation to the allowlist
#   block_trackers: true       # global default for the per-panel block_trackers
#   allow: []                  # extra allowed top-level-nav domains (every panel),
#                              # e.g. ["*.dashboards.corp.lan"] for self-hosted apps
#   sso_allow: []              # extra SSO/redirect domains on top of the bundled
#                              # security/allowlist-sso.txt, e.g. ["*.keycloak.corp.lan"]
