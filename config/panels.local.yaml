# =============================================================================
# SOC video-wall configuration — generated by setup.py
# Re-run `python3 setup.py` to change it (your answers become the defaults).
# =============================================================================
display:
  auto: true
  width: 1920
  height: 1080
  cols: 2
  rows: 2
  gap: 0
  layout: auto

panels:
  - id: p1
    engine: webkit
    grid: [0, 0]
    mode: direct
    url: "http://192.168.1.50:3000/login"
    vault_item: "SOC Panel 1"
    selectors:
      user: "#username"
      pass: "#password"
      submit: "button[type=submit]"
    login_marker: "#password"
    keepalive: { strategy: reload, intervalSec: 600 }

  - id: p2
    engine: webkit
    grid: [1, 0]
    mode: direct
    url: "http://192.168.1.51:3000/login"
    vault_item: "SOC Panel 2"
    selectors:
      user: "#username"
      pass: "#password"
      submit: "button[type=submit]"
    login_marker: "#password"
    keepalive: { strategy: reload, intervalSec: 600 }

  - id: p3
    engine: webkit
    grid: [0, 1]
    mode: direct
    url: "http://192.168.1.52:3000/login"
    vault_item: "SOC Panel 3"
    selectors:
      user: "#username"
      pass: "#password"
      submit: "button[type=submit]"
    login_marker: "#password"
    keepalive: { strategy: reload, intervalSec: 600 }

  - id: p4
    engine: webkit
    grid: [1, 1]
    mode: direct
    url: "http://192.168.1.53:3000/login"
    vault_item: "SOC Panel 4"
    selectors:
      user: "#username"
      pass: "#password"
      submit: "button[type=submit]"
    login_marker: "#password"
    keepalive: { strategy: reload, intervalSec: 600 }

# autossh SSH jump-host tunnel — -L forwards are derived from mode: tunnel panels
tunnel:
  enabled: false

# Fortinet (FortiGate) SSL-VPN — openfortivpn, creds from the vault (vpn.vault_item)
vpn:
  enabled: false

# Outbound proxy for the panel browsers — auth creds come from the vault
proxy:
  enabled: false
