# =============================================================================
# REBRAND THE WALL HERE.  Edit this one file to rebrand the whole product — the
# name, tagline, icon and accent colours flow into the launcher menu, the setup
# wizard, the desktop app entry (at install time) and the packaged metadata.
#
# Anything you leave out falls back to the built-in defaults, so a partial file
# is fine. Override at runtime with SOC_BRANDING_FILE=/path/to/branding.yaml, or
# drop a branding.yaml in /etc/soc-display/ on a deployed box.
# =============================================================================

name: "SOC Video Wall"          # full product name (titles, headers)
short_name: "SOC Wall"          # compact name (window title, menus)
tagline: "Operations console"   # one-line subtitle under the name
vendor: "s-b-repo"
homepage: "https://github.com/s-b-repo/p2soc"

# Scalable icon (SVG). Path is relative to the repo/deploy root, or absolute.
# Replace the file (or point this elsewhere) to rebrand the app icon.
icon: "share/icons/soc-wall.svg"

# Theme palette (hex). The default is a crisp SOC green-on-white console:
# light surfaces, an operational SOC-green primary, near-black-green text and a
# subtle green focus glow. Edit these to reskin BOTH the launcher and the wizard
# in one place; a rebrand only needs to override the keys it wants to change.
#
#   primary        SOC-green brand accent: mono eyebrow, status dot, left-borders,
#                  focus glow. Drives colors.primary (and desktop card).
#   setup/desktop  the green left-border accent for the Setup + Desktop cards.
#   kiosk          teal-green Kiosk card accent — same family, distinct hue so the
#                  three launcher tiles stay differentiable on white.
#   background     app/window background — the clean near-white console field.
#   surface_top    card/page/panel surface — a barely-green tinted white so cards
#                  lift off the bg without a drop shadow (flatness is the look).
#   surface_bottom sunken/checked card + input wells (the flat second stop).
#   border         thin green-grey hairline borders + dividers (low-chroma).
#   text           near-black-green primary text (high contrast, never pure black).
#   text_dim       green-grey secondary: subtitles, '//'-headers, hints.
#   accent_strong  darker green for button fills, hover borders, the header top-rule.
#   good           valid-field ring + ONLINE status (= primary).
#   warn           amber-on-white caution — the only non-green accent, used sparingly.
#   bad            error ring + invalid status (a brick red that survives on white).
colors:
  primary: "#FF0000"
  setup: "#1FA463"
  desktop: "#1FA463"
  kiosk: "#0E7C7B"
  background: "#FFFFFF"
  surface_top: "#F4F8F5"
  surface_bottom: "#EAF1EC"
  border: "#CFE0D4"
  text: "#0B1F14"
  text_dim: "#5B7567"
  accent_strong: "#157A49"
  good: "#1FA463"
  warn: "#B8860B"
  bad: "#C0341D"
