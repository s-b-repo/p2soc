<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="SOC Wall">
  <!-- shield backdrop -->
  <path d="M32 3 L56 11 V31 C56 46 46 56 32 61 C18 56 8 46 8 31 V11 Z"
        fill="#0f2740" stroke="#2f9e8f" stroke-width="2"/>
  <!-- 2x2 video-wall grid of panels -->
  <g fill="#2f9e8f">
    <rect x="18" y="18" width="12" height="9" rx="1.5"/>
    <rect x="34" y="18" width="12" height="9" rx="1.5"/>
    <rect x="18" y="31" width="12" height="9" rx="1.5"/>
    <rect x="34" y="31" width="12" height="9" rx="1.5"/>
  </g>
  <!-- SOC badge label -->
  <text x="32" y="53" text-anchor="middle" font-family="monospace"
        font-size="11" font-weight="bold" fill="#e8f4f1">SOC</text>
</svg>
