# Installed to /etc/ssh/sshd_config.d/10-soc-hardening.conf
# Key-only, no root, minimal surface. The Pi is an SSH *client* to the jump
# host; it does not need to forward or tunnel inbound.
PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PubkeyAuthentication yes
AuthenticationMethods publickey
MaxAuthTries 3
MaxSessions 4
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
ClientAliveInterval 300
ClientAliveCountMax 2
LoginGraceTime 20
# Restrict who can log in (create/keep an 'admin' account):
# AllowUsers admin
