#!/usr/sbin/nft -f
# SOC wall firewall — installed to /etc/nftables.conf (enable nftables.service).
#
# Posture: default-deny BOTH directions. Inbound is closed except loopback,
# established traffic, ICMP, and rate-limited SSH from `ssh_admin_cidr`.
# Outbound is an allowlist (SEC-2): the box may resolve DNS, sync time, obtain a
# lease, reach its VPN gateway(s) + jump host(s), and then everything else rides
# *inside* the VPN/SSH tunnel interfaces. A compromised renderer cannot beacon to
# an arbitrary host on the physical network.
#
# FAIL-CLOSED: `ssh_admin_cidr` defaults to loopback only. Remote SSH stays shut
# until you set your real admin subnet here (or via SSH_ADMIN_CIDR= at install).
# install.sh / setup.py REFUSE to enable this ruleset while it is 0.0.0.0/0.
#
# Fill the named sets below (vpn_gateways, jump_hosts, dns_servers) with YOUR
# infrastructure — the wall's whole job is to reach these, then tunnel. An empty
# set allows nothing extra (fail-closed): e.g. an empty jump_hosts set blocks all
# outbound SSH on the physical link.

define ssh_admin_cidr = 127.0.0.1/32     # <-- set to e.g. 192.168.1.0/24 to allow remote admin

# VPN / tunnel interfaces: traffic leaving through these is already inside an
# authenticated, encrypted tunnel, so it is allowed wholesale.
define tunnel_ifaces = { "tun0", "tun1", "ppp0", "wg0", "soc-wg0" }

flush ruleset

table inet filter {
    # Egress allowlist targets — populate `elements` with your hosts.
    set vpn_gateways { type ipv4_addr; }                       # e.g. elements = { 203.0.113.10 }
    set jump_hosts   { type ipv4_addr; }                       # e.g. elements = { 198.51.100.5 }
    set dns_servers  { type ipv4_addr; elements = { 127.0.0.1 } }   # your resolver(s)
    set ntp_servers  { type ipv4_addr; }                       # e.g. elements = { 162.159.200.1 }  your NTP host(s)

    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # ICMP / ping (helpful for monitoring)
        ip protocol icmp accept
        ip6 nexthdr ipv6-icmp accept

        # SSH for management (rate-limited brute-force guard)
        tcp dport 22 ip saddr $ssh_admin_cidr ct state new \
            limit rate 10/minute burst 5 packets accept

        # Vaultwarden (8222) and the kiosk host are localhost-only -> covered by
        # `iif lo accept` above; do NOT open them to the network.

        counter drop
    }

    chain forward { type filter hook forward priority 0; policy drop; }

    # ----------------------------------------------------------------------- #
    # Egress allowlist (SEC-2). policy drop: anything not explicitly allowed
    # cannot leave the box on the physical link.
    chain output {
        type filter hook output priority 0; policy drop;

        oif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # Anything inside the VPN/SSH tunnels is already authenticated+encrypted.
        oifname $tunnel_ifaces accept

        # Bootstrap services needed to *establish* the tunnels:
        # Outbound ICMP: allow echo-request rate-limited (path MTU/monitoring) and
        # the unreachable/time-exceeded types PMTUD needs; do NOT allow a renderer
        # to use ping as an unbounded covert exfil/beacon channel.
        ip protocol icmp icmp type echo-request \
            limit rate 5/second burst 5 packets accept            # ping, rate-limited
        ip protocol icmp icmp type { destination-unreachable, time-exceeded, parameter-problem } accept
        ip6 nexthdr ipv6-icmp icmpv6 type echo-request \
            limit rate 5/second burst 5 packets accept
        ip6 nexthdr ipv6-icmp icmpv6 type { destination-unreachable, packet-too-big, time-exceeded, parameter-problem, nd-neighbor-solicit, nd-neighbor-advert, nd-router-solicit } accept
        udp dport 67-68 accept                                    # DHCP lease (link-local)
        ip daddr @ntp_servers udp dport 123 accept                # NTP (pinned; tunnels need correct time)
        ip daddr @dns_servers udp dport 53 accept                 # DNS
        ip daddr @dns_servers tcp dport 53 accept

        # Reach the VPN gateway(s) to bring the tunnel up (common VPN ports).
        ip daddr @vpn_gateways udp dport { 500, 4500, 1194, 51820 } accept
        ip daddr @vpn_gateways tcp dport { 443, 1194, 10443 } accept

        # Reach the SSH jump host(s) for the autossh tunnel.
        ip daddr @jump_hosts tcp dport 22 accept

        counter drop
    }
}
