#!/usr/sbin/nft -f
# SOC wall firewall — installed to /etc/nftables.conf (enable nftables.service).
# Default-deny inbound. The vault + broker-less host bind to localhost only, so
# nothing SOC-related is exposed to the LAN. SSH is allowed (rate-limited) for
# management; tighten `ssh_admin_cidr` to your admin subnet.

define ssh_admin_cidr = 0.0.0.0/0    # <-- set to e.g. 192.168.1.0/24

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # ICMP / ping (helpful for monitoring)
        ip protocol icmp accept
        ip6 nexthdr ipv6-icmp accept

        # SSH for management (rate-limited brute-force guard)
        tcp dport 22 ip saddr $ssh_admin_cidr ct state new \
            limit rate 10/minute burst 5 packets accept

        # Vaultwarden (8222) and the kiosk host are localhost-only -> covered by
        # `iif lo accept` above; do NOT open them to the network.

        counter drop
    }

    chain forward { type filter hook forward priority 0; policy drop; }
    chain output { type filter hook output priority 0; policy accept; }
}
