# SOC video-wall — journald size cap (installed to
# /etc/systemd/journald.conf.d/10-soc.conf).
#
# A 24/7 kiosk on a 40 GB SD card logs continuously (panel load events, the VPN
# status pill polled every 10s, the memory watchdog every 30s, autossh/VPN
# supervisors). Debian/Raspberry Pi OS default the persistent journal to "up to
# 10% of the filesystem" (~4 GB on a 40 GB card) and keep older files until 15%
# free remains — a chatty VPN-flap loop plus long uptime can grow it for weeks.
# 200 MB is plenty for a kiosk and leaves the card safe indefinitely.
[Journal]
SystemMaxUse=200M
RuntimeMaxUse=50M
MaxRetentionSec=1week
MaxFileSec=1day
