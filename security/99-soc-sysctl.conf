# Installed to /etc/sysctl.d/99-soc.conf — tune the VM for zram on a 1 GB Pi.
# Favour compressed swap over reclaim thrash; small page-cluster suits zram.
vm.swappiness = 180
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
vm.page-cluster = 0

# --- kernel hardening (HARDEN-independent: cheap, broadly-supported, public kiosk)
# Each key is applied ONLY if /proc/sys/<path> exists on this kernel (install.sh
# strips unsupported keys before `sysctl --system`), so an older Pi kernel that
# lacks one skips-with-reason instead of aborting. uninstall removes this whole
# file and re-runs `sysctl --system`, so every knob reverts to the kernel default.
kernel.kptr_restrict = 2
kernel.dmesg_restrict = 1
kernel.yama.ptrace_scope = 2
kernel.unprivileged_bpf_disabled = 1
kernel.perf_event_paranoid = 3
net.ipv4.tcp_syncookies = 1
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
