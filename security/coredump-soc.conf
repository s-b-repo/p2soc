# SOC video-wall — disable coredumps (installed to
# /etc/systemd/coredump.conf.d/10-soc.conf).
#
# By design, renderers DO crash/OOM-restart on the 1 GB Pi (the watchdog +
# MemoryMax depend on it). With systemd-coredump present (default on Raspberry
# Pi OS) each renderer crash can write a multi-hundred-MB compressed core to
# /var/lib/systemd/coredump, and under sustained memory pressure crashes repeat
# and accumulate on the 40 GB card. You never debug cores in-place on a kiosk,
# so storing none is correct. (soc-wall.service also sets LimitCORE=0.)
[Coredump]
Storage=none
ProcessSizeMax=0
