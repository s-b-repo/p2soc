# systemd-zram-generator config -> installed to /etc/systemd/zram-generator.conf
# Compressed RAM swap so the 1 GB Pi can hold 4 panels + chart JS without OOM.
# zstd gives ~2.5x effective on idle/compressible dashboard pages.
[zram0]
zram-size = ram
compression-algorithm = zstd
swap-priority = 100
fs-type = swap
