# Installed to /etc/modprobe.d/soc-blacklist.conf (HARDEN=1).
# Physical-attack surface reduction for a publicly-exposed SOC wall: stop the
# kernel from auto-loading drivers for hot-plugged storage / DMA / modem devices.
#   usb_storage   — USB mass-storage (rogue thumbdrive data exfil / autorun)
#   firewire_core — FireWire/Thunderbolt DMA (direct-memory-access attacks)
#   cdc_acm       — USB CDC-ACM modems (rogue serial / cellular dial-out)
# `install ... /bin/true` also blocks explicit `modprobe`, not just autoload.
# Skip at install time with SOC_SKIP_MODPROBE=1. uninstall removes this file.
blacklist usb_storage
install usb_storage /bin/true
blacklist firewire_core
install firewire_core /bin/true
blacklist cdc_acm
install cdc_acm /bin/true
